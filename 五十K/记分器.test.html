<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五十K记分器 - 单元测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        h1 { text-align: center; margin-bottom: 20px; color: #22C55E; }
        h2 { margin: 20px 0 10px; color: #F59E0B; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .test-suite { background: #16213e; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .test-case { display: flex; justify-content: space-between; align-items: center; padding: 10px; margin: 5px 0; background: #0f0f23; border-radius: 4px; border-left: 3px solid #666; }
        .test-case.pass { border-left-color: #22C55E; }
        .test-case.fail { border-left-color: #DC2626; }
        .test-name { flex: 1; }
        .test-result { font-weight: bold; padding: 2px 10px; border-radius: 4px; }
        .test-result.pass { background: #22C55E; color: #000; }
        .test-result.fail { background: #DC2626; }
        .test-detail { font-size: 12px; color: #888; margin-top: 5px; }
        .summary { text-align: center; padding: 20px; background: #16213e; border-radius: 8px; margin-bottom: 20px; }
        .summary .pass { color: #22C55E; font-size: 24px; font-weight: bold; }
        .summary .fail { color: #DC2626; font-size: 24px; font-weight: bold; }
        .summary .total { color: #888; font-size: 18px; }
        .run-btn { display: block; margin: 20px auto; padding: 15px 40px; font-size: 18px; background: #2563EB; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        .run-btn:hover { background: #1D4ED8; }
    </style>
</head>
<body>
    <h1>🧪 五十K记分器 - 单元测试</h1>

    <div class="summary" id="summary">
        <div>点击下方按钮运行测试</div>
    </div>

    <button class="run-btn" onclick="runAllTests()">运行所有测试</button>

    <div id="test-results"></div>

    <script>
        // ==================== 核心计算逻辑（从记分器提取）====================
        const bombLabels = { 200: '5张', 500: '6张', 1000: '7张', 2000: '8张', 5000: '9张', 10000: '10张' };
        const tourBonuses = { none: [0, 0], our12: [200, -200], our13: [100, -100], their12: [-200, 200], their13: [-100, 100] };

        // 计算单把得分
        function calculateHandScore(baseScore, bombs, tourBonus) {
            const bombScore = bombs.reduce((sum, b) => sum + b, 0);
            return baseScore + bombScore + tourBonus;
        }

        // 计算级数（四舍五入，支持负数）
        function calculateLevel(totalScore) {
            return Math.round(totalScore / 100);
        }

        // 计算总分
        function calculateTotalScore(accumulated, currentHand) {
            return accumulated + currentHand;
        }

        // 判断胜负
        function determineWinner(ourLevel, theirLevel, ourTotal, theirTotal) {
            if (ourLevel > theirLevel) return 'our';
            if (theirLevel > ourLevel) return 'their';
            if (ourTotal > theirTotal) return 'our';
            if (theirTotal > ourTotal) return 'their';
            return 'draw';
        }

        // ==================== 测试框架 ====================
        let passCount = 0;
        let failCount = 0;
        const testSuites = {};

        function describe(name, tests) {
            testSuites[name] = tests;
        }

        function test(name, fn) {
            try {
                const result = fn();
                if (result.pass) {
                    passCount++;
                    return { name, status: 'pass', detail: result.detail || '' };
                } else {
                    failCount++;
                    return { name, status: 'fail', detail: result.detail || '断言失败' };
                }
            } catch (e) {
                failCount++;
                return { name, status: 'fail', detail: e.message };
            }
        }

        function expect(actual) {
            return {
                toBe(expected) {
                    return {
                        pass: actual === expected,
                        detail: `期望: ${expected}, 实际: ${actual}`
                    };
                },
                toEqual(expected) {
                    const pass = JSON.stringify(actual) === JSON.stringify(expected);
                    return {
                        pass,
                        detail: `期望: ${JSON.stringify(expected)}, 实际: ${JSON.stringify(actual)}`
                    };
                },
                toBeGreaterThan(expected) {
                    return {
                        pass: actual > expected,
                        detail: `期望 > ${expected}, 实际: ${actual}`
                    };
                },
                toBeLessThan(expected) {
                    return {
                        pass: actual < expected,
                        detail: `期望 < ${expected}, 实际: ${actual}`
                    };
                }
            };
        }

        // ==================== 测试用例 ====================

        describe('基础分计算', () => [
            test('双方基础分初始化为0', () => {
                const ourBase = 0;
                const theirBase = 0;
                return expect(ourBase).toBe(0) && expect(theirBase).toBe(0);
            }),

            test('双方独立输入基础分', () => {
                const ourBase = 150;
                const theirBase = 50;
                return expect(ourBase + theirBase).toBe(200);
            }),

            test('基础分可为负数（游次惩罚）', () => {
                const baseScore = 0;
                const tourBonus = -200; // 对方1、2游
                const total = baseScore + tourBonus;
                return expect(total).toBe(-200);
            })
        ]);

        describe('炸弹计分', () => [
            test('5张炸弹=200分', () => {
                const bombs = [200];
                const score = calculateHandScore(0, bombs, 0);
                return expect(score).toBe(200);
            }),

            test('多个炸弹累加', () => {
                const bombs = [200, 500, 1000];
                const score = calculateHandScore(0, bombs, 0);
                return expect(score).toBe(1700);
            }),

            test('无炸弹时炸弹分为0', () => {
                const bombs = [];
                const score = calculateHandScore(0, bombs, 0);
                return expect(score).toBe(0);
            }),

            test('10张炸弹=10000分', () => {
                const bombs = [10000];
                const score = calculateHandScore(0, bombs, 0);
                return expect(score).toBe(10000);
            })
        ]);

        describe('游次加分', () => [
            test('无游次时双方均为0', () => {
                const [our, their] = tourBonuses.none;
                return expect(our).toBe(0) && expect(their).toBe(0);
            }),

            test('我方1、2游：我方+200，对方-200', () => {
                const [our, their] = tourBonuses.our12;
                return expect(our).toBe(200) && expect(their).toBe(-200);
            }),

            test('我方1、3游：我方+100，对方-100', () => {
                const [our, their] = tourBonuses.our13;
                return expect(our).toBe(100) && expect(their).toBe(-100);
            }),

            test('对方1、2游：对方+200，我方-200', () => {
                const [our, their] = tourBonuses.their12;
                return expect(our).toBe(-200) && expect(their).toBe(200);
            }),

            test('对方1、3游：对方+100，我方-100', () => {
                const [our, their] = tourBonuses.their13;
                return expect(our).toBe(-100) && expect(their).toBe(100);
            })
        ]);

        describe('级数计算', () => [
            test('100分=1级', () => {
                return expect(calculateLevel(100)).toBe(1);
            }),

            test('150分=2级（四舍五入）', () => {
                return expect(calculateLevel(150)).toBe(2);
            }),

            test('50分=1级（四舍五入）', () => {
                return expect(calculateLevel(50)).toBe(1);
            }),

            test('49分=0级（四舍五入）', () => {
                return expect(calculateLevel(49)).toBe(0);
            }),

            test('0分=0级', () => {
                return expect(calculateLevel(0)).toBe(0);
            }),

            test('负分：-100分=-1级', () => {
                return expect(calculateLevel(-100)).toBe(-1);
            }),

            test('负分：-150分=-2级', () => {
                return expect(calculateLevel(-150)).toBe(-2);
            }),

            test('负分：-50分=-1级（四舍五入）', () => {
                return expect(calculateLevel(-50)).toBe(-1);
            }),

            test('大分：10000分=100级', () => {
                return expect(calculateLevel(10000)).toBe(100);
            })
        ]);

        describe('总分计算（支持负分）', () => [
            test('单把总分=基础分+炸弹+游次', () => {
                const baseScore = 100;
                const bombs = [500];
                const tourBonus = 200;
                const total = calculateHandScore(baseScore, bombs, tourBonus);
                return expect(total).toBe(800);
            }),

            test('游次惩罚导致负分', () => {
                const baseScore = 0;
                const bombs = [];
                const tourBonus = -200; // 对方1、2游
                const total = calculateHandScore(baseScore, bombs, tourBonus);
                return expect(total).toBe(-200);
            }),

            test('累积多把得分', () => {
                const accumulated = 500;
                const currentHand = 300;
                const total = calculateTotalScore(accumulated, currentHand);
                return expect(total).toBe(800);
            }),

            test('累积后仍有负分', () => {
                const accumulated = 100;
                const currentHand = -200;
                const total = calculateTotalScore(accumulated, currentHand);
                return expect(total).toBe(-100);
            }),

            test('多把累积总分', () => {
                const hands = [100, 200, -50, 150, 300];
                const total = hands.reduce((sum, h) => sum + h, 0);
                return expect(total).toBe(700);
            })
        ]);

        describe('胜负判定', () => [
            test('级数高者胜', () => {
                const winner = determineWinner(5, 3, 500, 300);
                return expect(winner).toBe('our');
            }),

            test('级数低者负', () => {
                const winner = determineWinner(2, 5, 200, 500);
                return expect(winner).toBe('their');
            }),

            test('级数相同时比较总分-总分高者胜', () => {
                const winner = determineWinner(3, 3, 350, 320);
                return expect(winner).toBe('our');
            }),

            test('级数和总分都相同为平局', () => {
                const winner = determineWinner(3, 3, 300, 300);
                return expect(winner).toBe('draw');
            }),

            test('负级数比较', () => {
                const winner = determineWinner(-1, -2, -100, -200);
                return expect(winner).toBe('our');
            }),

            test('一方正级一方负级', () => {
                const winner = determineWinner(3, -1, 300, -100);
                return expect(winner).toBe('our');
            })
        ]);

        describe('边界情况', () => [
            test('双都0分0级为平局', () => {
                const winner = determineWinner(0, 0, 0, 0);
                return expect(winner).toBe('draw');
            }),

            test('最大炸弹分数', () => {
                const bombs = [10000, 10000, 10000];
                const score = calculateHandScore(0, bombs, 0);
                return expect(score).toBe(30000);
            }),

            test('各种炸弹组合', () => {
                const bombs = [200, 500, 1000, 2000, 5000, 10000];
                const score = calculateHandScore(0, bombs, 0);
                return expect(score).toBe(18700);
            }),

            test('极端负分情况', () => {
                const baseScore = -100; // 假设极端情况
                const bombs = [];
                const tourBonus = -200;
                const total = calculateHandScore(baseScore, bombs, tourBonus);
                return expect(total).toBe(-300);
            })
        ]);

        describe('把数累积', () => [
            test('第一把记录', () => {
                const handRecord = {
                    our: { totalScore: 500 },
                    their: { totalScore: 200 }
                };
                const accumulated = { our: 0, their: 0 };
                const newAccum = {
                    our: accumulated.our + handRecord.our.totalScore,
                    their: accumulated.their + handRecord.their.totalScore
                };
                return expect(newAccum.our).toBe(500) && expect(newAccum.their).toBe(200);
            }),

            test('多把累积', () => {
                const hands = [
                    { our: 300, their: 100 },
                    { our: 200, their: 250 },
                    { our: -100, their: 400 }
                ];
                const totalOur = hands.reduce((s, h) => s + h.our, 0);
                const totalTheir = hands.reduce((s, h) => s + h.their, 0);
                return expect(totalOur).toBe(400) && expect(totalTheir).toBe(750);
            }),

            test('删除一把后重新计算', () => {
                const hands = [
                    { our: 300, their: 100 },
                    { our: 200, their: 250 },
                    { our: 100, their: 150 }
                ];
                // 删除第二把
                hands.splice(1, 1);
                const totalOur = hands.reduce((s, h) => s + h.our, 0);
                const totalTheir = hands.reduce((s, h) => s + h.their, 0);
                return expect(totalOur).toBe(400) && expect(totalTheir).toBe(250);
            })
        ]);

        // ==================== 运行测试 ====================
        function runAllTests() {
            passCount = 0;
            failCount = 0;

            let resultsHtml = '';

            for (const [suiteName, tests] of Object.entries(testSuites)) {
                const testResults = tests.map(t => t);
                resultsHtml += `
                    <div class="test-suite">
                        <h2>${suiteName}</h2>
                        ${testResults.map(r => `
                            <div class="test-case ${r.status}">
                                <div>
                                    <div class="test-name">${r.name}</div>
                                    ${r.detail ? `<div class="test-detail">${r.detail}</div>` : ''}
                                </div>
                                <div class="test-result ${r.status}">${r.status === 'pass' ? '✓ 通过' : '✗ 失败'}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            document.getElementById('test-results').innerHTML = resultsHtml;

            document.getElementById('summary').innerHTML = `
                <div style="margin-bottom: 10px;">
                    <span class="pass">${passCount} 通过</span>
                    <span style="margin: 0 20px;">|</span>
                    <span class="fail">${failCount} 失败</span>
                </div>
                <div class="total">共 ${passCount + failCount} 个测试</div>
            `;
        }

        // 页面加载后自动运行
        window.onload = runAllTests;
    </script>
</body>
</html>
